body:
  text: 釣磯立談自楊氏奄有江淮其牧守多武夫悍人類以威驁相髙平居齋几之間往往以斬伐為事至有位居侯伯而目不識點畫手不能捉筆者及烈祖以軍功牧升州初以文藝自好招徠儒俊共論治體總督亷吏勤恤民隱由是逺邇宅心以為已歸義祖聞之自京口往視其所為見其城隍浚整樓堞完固府署中外肅肅咸有條理遂自徙治而居之更以京口付烈祖時金陵之民顧懷其惠莫不心折氣沮但逼迫義祖之威而無敢建白者初烈祖雅不欲朱方之行丐為宣城而義祖不之許尚遲徊若有所待客有宋齊丘者私勸烈祖曰昔項羽背約王沛公以漢中之地時皆以為失職左遷唯蕭何贊之以為語有天漢其稱甚美今明使君中有大志而忽得京口其名殆不可失也且西朝拱巳知訓童昏老臣宿將不甘詬辱度其勢亂在旦暮蒜山之津曽不一昔而可以定事更捨此利而求入宣城山中卒卒度嵗月其無聊奈何烈祖驚起執其手曰善哉子嵩非吾子吾無所聞之中夕促駕而之官其在京口政猶金陵也居無何朱瑾殺知訓廣陵大亂烈祖以兵宵濟朝不易位而中外晏如遂代知訓執政柄霸圖兆於此矣叟曰禍福之來雖各象德而事有機會皆相憑籍是以風旋而上升水激則彌悍有情之所忘每為無情之所轉太空之中夫疇覺之哉向若義祖本無歆羡金陵之心則烈祖不得徙鎮矣又烈祖以梅冶自乞或如其欲則亦無因而至京口矣京口之不至則廣陵之亂孰恃而弭廣陵之功不在烈祖則霸圖亦無自而託業矣吁夫豈人謀之所及也耶非人謀之所及然後有以知天命之至不可以幸而兾也昔者伊摯以媵女而相成湯百里奚以鬻羊而見知於秦穆竇姬行號而母漢室袁婦伏膝而嫓曹宗是故非意之意嘗為事之基胎一日之濩落君子不以為病焉知卒業之有所在故也趙王李德誠有客能言天文以之占測時事十有七八一旦謂德誠曰昨夕玄象大異揚州當流血無限朝貴陷首穴胸後考其日乃朱瑾殺知訓之夕也又烈祖執政柄時義祖忌之將啓以知詢為代中外岌岌人無固志宋齊丘夜召知術者劉通微同宿而徵其事坐久聞鼓聲通微投袂而起曰子嵩事必中變政事僕射安若太山不足多慮也彼懷惡志者自當受禍金鼓之聲澌澌然殆有大喪歟夕未曙捷步至白義祖死矣叟曰吉凶之萌未見兆眹而上動躔次旁關聲象彼知術者乃能言之於事先若合契劵曽無毫釐之差然則阪之不可以為陵陵之不可以為隰髙下隆殺固已有經分而懸定於冥默間者矣世之昧者方且逞智術勞思慮虛憍夸毗以意其所不可必顛狂妄行而卒與禍會吁可勝恨也耶吳王稱號淮海時廣陵殷盛士庶駢闐忽一旦有黃冠道人狀如病狂手持一竿竿首挂一木刻為鯉魚形自云鍾離人也行歌於市曰盟津鯉魚肉為角濠梁鯉魚金刻鱗盟津鯉魚死欲盡濠梁鯉魚始驚人又云橫排三十六條鱗箇箇圓如紫磨真為甚竿頭挑著走世間難遇識魚人大率如此意者凡數十篇時人莫能曉嵗餘忽不知所之其後武義年中江南謡言又有東海鯉魚飛上天之語及烈祖受命復姓李氏立唐社稷其言方驗叟曰鯉之於李聲相通也魚而肉角則龍矣雖以金刻鱗猶為魚也江南雖號為強國而以偏霸終焉魚之象也頃嘗讀西天竺書説因因相襲皆如旦之有夕相隨不捨其言信然大抵帝王稱制其德澤方廣滋液滲漉流以及逺根葉敷布雖五運互迭不無興衰要其種姓當有肖似者是以二帝三王共祖軒轅卯金之祚絶而復續江南諸蕭雖享國之日淺然無大罪戾向契丹使至江南乃云有蕭氏者與耶律氏相為始終由是考之濠梁胄出盟津厥有旨哉烈祖初得政盡反知訓之所為接御士大夫曲加禮敬躬履朴素屏去浮靡而又寬刑勤理孜孜不倦是時方鎮窺伺事資彈壓烈祖視聽不妄指撝中節平居自號曰政事僕射髙位重爵推與宿舊故得上下順從人無異志齊臺之建擢宋齊丘徐玠為左右丞相於其所居第旁創為延賔亭以待四方之士遣人司守關徼物色北來衣冠凡形狀竒偉者必使引見語有可採隨即升用聽政稍暇則又延見士類談宴賦詩必盡歡而罷了無上下貴賤之隔以此二十年間委曲庶務無不通知興利去害人望日隆沈彬先事獻山水畫障詩云須知手筆安排定不怕山河整頓難及將受禪頭陀范志嵩賦月詩云徐徐東海出漸漸到亨衢此夜一輪滿清光何處無槩以是言之人之與能也有自來矣是以吳社遷換而國中夷然無易姓之戚蓋盛德之所移故也叟曰峻極之山神明憑依蘙薈之丘雲氣出焉凡水之有旋拍折波者必生修鱗帝王之量其亦有兼人者矣嘗試觀孝髙皇帝其總收權綱維御羣雋當國匪懈敦守純朴雖漢之髙光不是過也徒以其﨑嶇偏左之國地勢不便加以天之付畀自有限量自是逺圖之所就僅足以稱霸而已惜夫武義中有童謡云江北楊花作雪飛江南李樹玉團枝李花結子可憐在不似楊花沒了期及烈祖受禪其日白雀翔於庭郡國以符瑞言者不可以數計其尤著者江西楊花為李臨川李樹生連理於是始下還宗之議初立唐宗廟定郊堂之位圓丘毖祀之夕乃孟夏上旬月至三鼓當沒而升壇之際皎然如晝柴燎畢乃沒太史奏言月延三刻逺近嘆以為異事叟嘗見長老相與言頗有疑以為未必然者其意蓋以為南唐在六合間才數州之境詎得天應以祥眚如是之審也叟辨之曰人之精誠上下感假旦晝之所接精祲之所交亦何所不有昔衛先生畫長平之䇿而太白襲月燕丹謀秦而白虹貫日魯陽揮戈而羲輪輟御宋景有一言之善而法星退舍以至桞起上林石立太山赤伏登漢金雌讖晉或曲為一姓或専繇一人亦有庶女銜寃而赤地千里隕霜殺菽匹夫致孝而魚躍氷開冬竹生萌近世馬仁裕之生也紫氣充庭盧文進出軍失律而黑蟒擁膝及其沒也赤氛霄騰有星落如杯闕景晝寢而丹蛇遊於顴凖之間王輿夢有流星之警而幾斃於飛石凡此數子者位不過節將然猶響應昭彰又况胙土開國五十年中江表無事為人神主以對越上下者耶説者乃以隋志日行上道遂疑往事無凖固不可以執一而廢百也烈祖每言百姓皆父母所生安用爭城廣地使之肝腦異處膏塗草野是以執吳朝之政僅將一紀才一拒越師所謂不得已而用之及受禪年兩江土宇比諸侯最廣兵力雄盛氣可以吞噬謀臣桀將方有建立功名之意一日內宴中坐有詔曰知足不辱道祖之至戒革廓則裂前哲之元龜豫嘉與一二卿士大夫共服斯針討伐之議願勿復關白也其後錢塘大火宫室器械為之一空宋齊丘乘間進言曰夫越與我唇齒之國也我有大施而越人背之虔劉我邊陲汚濁我原泉股不附髀終非我用今天實棄之我師晨出而暮踐其庭願勿失機為後世憂烈祖愀然久之曰疆域雖分生齒理一人各為主其心未離橫生屠戮朕所弗忍且救災睦鄰治古之道朕誓以後世子孫付之於天不願以力營也大司徒其勿復以為言於是特命行人厚遺之金粟繒綺蓋車相望於道焉暮年先理治命引元宗而告之曰德昌宫凡積兵器緡帛七百餘萬吾既棄代汝善和鄰好以安宗祏為意不宜襲隋煬帝之迹恃食阻兵以自取亡覆也於時中外寢兵耕織嵗滋文物彬煥漸有中朝之風采元宗之初尚守聖訓改元保大蓋有止戈之旨三四年間皆以為守文之良主會元老去位新進後生用事爭以事業自許以為蕩定天下可以指日而就上意熒惑移於多口由是搆怨連禍􅕚國之勢遂如削肌其後宋齊丘復起於遷謫之中謀為自固更相唱和兵結而不得解矣未及十年國用耗半有杜昌鄰者經事永陵還自外鎮復領計司撫案大慟曰國事去矣夫鴻鵠養護六翮將致千里今拔取之以傅斥鷃寧不使人恨恨也叟嘗笑諸葛孔明號稱王佐才然不知地小人單窮兵不休兩川之人坐是不聊生忠則忠矣安所事智今江南壤毛瘠薄土泉不深其人輕狡剽悍不能耐久非中國之敵也自有宇宙以來未有偏據而可以成大功者稽考永陵之心夫豈不欲以并包席卷為事耶顧其所處勢有未便故也有如孫陳之季皆區區不度以至魚爛由是言之江表五十年間父不哭子兄不喪弟四封之內安恬舒嬉雖流離僑寓之人亦獲安堵弗夭弗橫以得及真人之期吁烈祖為有大造於斯土也明矣周世宗伐淮之嵗建陽孟貫於駕前獻所業其首篇貽棲隱洞章先生有不伐有巢樹多移無主花之句世宗宣見問貫曰朕伐罪弔民何有巢無主之有然獻朕則可他人應不汝容矣叟嘗謂孟貫小生不知所以邀説萬乘之道而世宗皇帝亦不得不為失辭古訓有之師以直為壯曲為老又魏絳之辭曰師衆以順為武王者之師有不出則已矣其舉事也沛如時雨之將至百榖仰之以生焉夫人胥仰之以生則孰肯為敵而輸死江南初未有失德也徒以連叛臣而致討且疆場之故一彼一此亦胡可勝言乃如周之本謀但規取淮壤而借此以為之辭詩云鼓鐘于宫聲聞于外聲之所馳無翼而能飛方將幸人之不之知弗可得也頃見故老猶能言淮上事周師之出也畝無栖糧廩無留藏卷地以往視人如土芥墳墓圯毁老幼係縲墟落之地胔腐骨填里鼓絶響殆無炊煙於是自𨝍溝以北皆羣聚而成盜團糊紙以為甲壞鋤耰以為器因廢壘以為固官軍與之對則往往折北是以劉仁贍以死守夀春人相啖食而城卒不肯下孫忌睢盱於樓車之上不顧身首異處違詔而致其區區之忠為人臣有如此二人者可以與古烈士比曽不標異以奬薄俗而俱從顯戮文武之師固如是乎當此之時人心踽踽然南首以冀會李氏君臣失謀橫生嫌間其兵出不返望旗而先潰然且鑾輿再駕而僅足以成割江之計所謂楚則過矣齊亦未為得也顧豈如甲戌之師曽不衄而一國歸命焉詩云匪疚匪棘王國來極正斯之謂歟宋子嵩以布衣干烈祖言聽計售遂開五十三州之業宗祀嚴配不改唐舊可謂南國之宗臣矣及世事移改新用事者爪距銛鋭方曹起而朋擠之當其弔影於九峰之底所謂幾瀕於死地一旦復得政柄內顧根抵失據危而易搖因隳其初心而更思所以為自完計首開拓境之説規以矜企動上心於是南生楚隙西結越釁晚舉全國之力而頓兵於甌閩堅壁之下飛挽芻粟徵發徭戍四境之內為之騷然鍾山李公建勳為賦詩有粟多未必為全䇿師老須防有伏兵之句蓋切中於當時之病李宗坐是不競而子嵩之名亦因以隕悲夫叟嘗謂頺垣夷塹何有於圬墁毁冕裂辨孰施於面目正子嵩之謂矣且古之欲固其位者亦何所不為為女寵婦謁所以蕩其情也為田獵觀遊所以耗其志也為落落不合所以開其矜夸也為戰鬭危事所以胥其恇怯也人君倘不自覺知未有不墮其計中者竊嘗譬之一國之有君猶心之宅百體也苟一體之不密則膚腠受邪而病氣干其正矣病氣干其正日以漸靡而曽不之知猶且表表自喜以為完人其可復覬也耶有如子嵩者其生平志業蓋以孔明茂𢎞為不足法至其晚節末路乃乘人主膚腠之隙而危為一竅之邪鄙哉斯人也鄙哉斯人也古語不云乎棟折榱崩僑將壓焉抑謂是也夫邊南院之始為將也愛惜士卒分甘絶苦其所過之地秋毫不犯出入城邑整齊而有容時人從而目之曰邊菩薩望其旄纛之所指舉欣然相告曰是庶幾其料理我也及其既耄則威不克愛綱紀紊亂玩侮叨瀆禁約不勝時人又從而目之曰邊和尚望其旄纛之所指舉疾視而相告曰是憒憒者毋寧其凂我也叟曰夫愛憎之實既貿於區中則毁譽之形必遷於外次譬之龜焉灼其中者文見於兆矣古語云愛其人者愛其屋上烏憎其人者憎其儲胥夫烏之所集其屋必潤儲胥者主人儲意以待客之地其敬我者更將致憎故君子之所以自立不可不戒唐祚中興大臣議廣土宇往往皆以為當自潭越始烈祖不以為是一旦召宋齊丘馮延己等數人俱入元宗侍側上曰天下之勢低昻如權衡要當以河山為腹背腹背奠然後手足有所運朕藉楊徐遺業撫有東夏地勢未便猶如繪事窘於邊幅雖有手筆無所縱放毛遂云錐未得處囊中故也如得處囊中則必脫頴而出矣我之所志大有以似此每思髙祖太宗之基緒若墜氷谷痿人不忘起盲人不忘視以方我心未足以訓其勤然所以不能躬執干戈為士卒先者非有所顧怯也未得處囊中故也馮延己越次而對曰河山居中以制四極誠如聖旨然臣愚以為羽毛不備不可以逺舉旌麾黯暗不可以號召輿賦不充不可以興事陛下撫封境之內恭已靜默所以自守者足矣如將有所志必從跬步始今王潮餘孽負固閩徼井蛙跳梁人不堪命錢塘君臣孱駑不能自立而又刮地重斂下户斃踣荆楚之君國小而夸以法論之皆將肇亂且其壤接地連風馬相及臣愚以為興王之功當先事於三國上曰不然土德中否日失其序倘天人之望或未之改朕尚庶幾從一二股肱之後如得一拜陵寢死必目瞑然嘗觀劉德輿乘纍捷之威羣敵斂衽之際不得據有中原乃留弱子而狼狽東歸朕甚陋之及聞李密勸玄感鼓行入關意壯其言至密自王亦不能決意以西也近徐敬業起江淮之衆鋒鋭不可當不能因人之心直趍河洛而反遊兵南渡自營割據識者知其不能成事矣此皆巳事之驗也朕每傷之錢氏父子動以奉事中國為辭卒然犯之其名不祥閩土險瘠若連之以兵必半嵗乃能下恐所得不能當所失也况其俗怙強喜亂既平之後彌煩經防唯諸馬在湖湘間恣為不法兵若南指易如拾芥孟軻謂齊人取燕恐動四鄰之兵徒得尺寸地而享天下之惡名我不願也孰若悉輿稅之入君臣共為節儉惟是不腆之圭幣以奉四鄰之歡結之以盟詛要之以神明四封之外俾人自為守是我之存三國乃外以為蔽障者也疆場之虞不警於外廷則寬刑平政得以施之於統內男不失秉耒女無廢機織如此數年國必殷足兵旅訓練積日而不試則其氣必倍有如天啓其意而中原忽有變故朕將投袂而起為天下倡倘得遂北平僣竊寧乂舊都然後拱揖以招諸國意雖折簡可致也亦何以兵為哉於是孫忌及宋齊丘同辭以對曰聖志逺大誠非愚臣等所及也上嘗服金石藥疽劇將崩呼元宗登御榻嚙其指至血出戒之曰他日北方當有事勿忘吾言保大中查文徽馮延魯陳覺等爭為討閩之役馮延己因侍宴為嫚言曰先帝齪齪無大略每日戢兵自喜邊壘偶殺一二百人則必齎咨動色竟日不怡此殆田舍翁所為不足以集大事也今陛下暴師數萬流血於野而俳優燕樂不輟於前真天下英雄主也元宗頗頷其語其後閩土判渙竟成遷延之兵湖湘既定而復變地不加闢財乏而不振會耶律南入中國大亂邊地連表請歸命而南唐君臣束手無能延納者韓熙載上疏請乘釁北略而兵力頓匱望洋不可為計刮瘍裹創曽未得稍定而周祖受命世宗南征全淮之地再戰而失元宗始自嘆恨厭厭以至於棄代時有隱君子作為割江賦以譏諷其事又有隱士詩云風雨揭却屋渾家醉不知將遷幸南都而伶人李家明亦獻詩云龍舟悠漾錦帆風雅稱宸遊望逺空偏恨皖公山色翠影斜不入夀杯中故知傾國之漸良由廢烈祖之聖訓而致然也叟曰國之將亡拔本塞源元宗自在藩邸仁孝播聞及怵於賊臣之諛言至詆誣先烈以自聖嚙指顧命忽如風之過耳天不祚唐可為傷心吁憸人小夫不足以共謀國也如此叟每置念於中則不覺為之墮睫烈祖使馮延己為齊王賔佐孫晟面數延己曰君嘗輕我我知之矣文章不如君也技藝不如君也談諧不如君也然上置君於親賢門下期以道義相輔不可以誤國朝大計也延己失色不對而起叟曰昔賈誼為漢建治安之䇿其言反覆每以太子為根本及太宗皇帝朝劉洎亦推明其説蓋傳付之重當慎厥初伏覩元宗天資粹美聞見卓逺倘使重厚識體之臣左右前後助成聖德則必能拱手垂衣克承負荷叟聞長老説馮延己之為人亦有可喜處其學問淵博文章頴發辨説縱橫如傾懸河暴而聽之不覺膝席之屢前使人忘寢與食但所養不厚急於功名持頥豎頰先意希旨有如脂膩其入人肌理也習久而不自覺卒使烈祖之業委靡而不立夫然後知孫丞相可謂有先知之明世之議者乃指以為由忮心而發豈其然耶陳覺不俟詔旨進討福州馮延魯貪功亟謀犄角及戎律大撓輿尸不歸元宗大怒命鎖二臣至國都奪官流之支郡祕書丞韓熙載上疏請誅斬以謝國人其略云擅興者無罪則疆場生事之臣恬不知畏喪師者獲存則行陳效死之士何視而勸元宗不能用其語叟初聞江南老人言熙載素惡於二馮又與陳覺故不相知是以因其隙而危攻之其言不無過也及見後主歸命家國湮覆求其傾圮之漸乃兆於討閩之役然則雖斷二子之首蓋不足以贖責自樊若水裒取隂事輸之於天朝國人恨之入於骨髓至發其先壟投骨於江流由是以考之韓之至言當自為體國而發彼輕以小人之心而揣量君子殊愧前聞之陋元宗神彩精粹詞旨清暢臨朝之際曲盡姿致湖南嘗遣廖法正將聘既還語人曰汝未識東朝官家其為人粹若琢玉南嶽真君恐未如也是以荆渚孫光憲敘續通厯云聖表聞於四鄰蓋謂此也又其天性雅好古道被服朴素宛同儒者時時作為歌詩皆出入風騷士子傳以為玩服其新麗是時承烈祖勤儉之後國家富給羣臣􅍾觚管小技侍從左右乘間納邪説多自謂國勢崇盛如舉太山以壓朽壤蕩定之期指日可俟會閩荆兄弟爭國有釁可乘上亦昧於幾先熒惑利口於是連兵十許年國削民乏渺然視太平之象更若捕風繫影初惠昭太子少有逺見力諫上不如息兵養民不蒙聽納忽忽自失以至暴亡至是上痛自懲艾復思太子語往往涕下交頥自議南遷豫章百不如意邑邑無聊以至捐棄服御叟嘗讀漢紀見班固贊元帝優柔大率頗似元宗古今異世而乃適同尊號西都坐是不振而南國亦復隂隂如日就暮因感揚雄論魯不用真儒之説又傳稱是儀也非禮也唯禮為能定國吁非真儒不足以救國之危削非明禮不足以權國之安榮元宗君臣殆有遺恨於此西平王周本經事諸楊最為純臣雖不知書而愛重儒士賔禮寮屬不撓其權故所至稱治後唐莊宗初入洛吳遣盧蘋致賀帝歷數南朝大臣尤多本以為忠勇叟嘗記危全諷以十萬衆據象牙潭楚人為圍髙安以為之聲援朝廷旰食嚴可求薦本可以為將本堅辭不肯起徐自建白曰往年長洲之戰非不敵也特以上將權輕下皆専命互相觀望以至軍不克振今必見委倘不設偏禆老臣願出死力以報厚恩朝廷許之本乃具選兵七千人計食賫糧晨夕兼馳朝貴或有追送者不肯少留且曰兵事神速停營信宿衆寡情見則不可用也吾欲及其鋭而使之是時髙安危急人皆謂當先䇿援本曰不然楚人非有戰心也姑欲牽綴我師使全諷得畢力爾我必先擒此賊彼自當解遂直搗象牙潭突其壘疾攻之全諷少其衆且笑本率易殊不顧答本先遣徑卒穿出其後乘髙疾呼撫人大崩矢石未及接爭赴水以死本建大將旗鼓徐驅而薄之全諷據胡床瞪視不及指揮而就擒我軍大歡楚人果宵遁矣叟嘗壯西平此舉以為近世未有成功之速如此比者嘗見中朝常丞相衮有言曰自二漢以來每有兵戎必建専征之帥衛青霍去病専統五道連率九郡之師遂清漠北竇憲發北軍五校黎陽沿邊十二郡騎及羌胡胸奴兵卒勒燕然魏命夏侯惇都督二十六軍留鎮於巢終成帝業晉命王濬杜預等七軍都督二十萬衆卒平東吳後周時奚胡雜種叛於夏州一城之難賊衆至少猶命于謹置大行臺統五州軍事以討平之隋五原部落雜叛敵甚易取亦使髙熲領行軍元帥以出征及國初輔公祏反丹陽命李靖為副元帥統李績等七總管以擒之吐谷渾寇邊命任城王道宗等五軍擊降之開元以後天下無事戎鎮玩安浸紊經制然至德以來尚有統帥也唯鄴城之役九節度之師逡巡而潰以無統帥無所制命故也吁纆牽俱長則顛蹶可待驂服共駕則輪輿必奔孰謂西平不知書耶蓋與兵法可謂暗合者矣髙審思守夀春大為警備晨夕出號刁斗相屬躬率士卒繕完城塹樓櫓渠答色色整飭或誚以為選懦大不可以示敵也掾史聞而恥之因間入白曰此城天險號曰金湯今以明將軍之威士卒莫不效命亦安用曉昏孜孜勞苦神算者耶審思笑而答曰君以老兵為怯耶夫兵固多變不可以不懼過而防之䇿之上者君但治曹事看老兵格虜如何爾一旦北兵奄至城下先使水工奪城中水道穿浚所從入每礙於角勒不得進又為棚車載兵以臨城上城中飛竿起火隨方而焚之立盡又為地道潛攻向城而隧之所出適與金鼓相值北兵相顧失色曰此真守邊將軍也解圍而去行未數里而審思先為潛機載徑卒行地中繞出北兵之前曵薪揚塵坌埃漲天鳴鼓疾呼而至北兵􅌓眙皆以為從天墜也審思又發懸門出衆夾而攻之北兵殱焉由是終審思之世夀春不受圍向日掾史拜而言曰將軍天也愚不能及矣叟曰古之善將兵者能勇能怯能弱能強髙審思其有焉徐丞相玠反覆於楊李之際竟以恩澤自固纍臨方鎮率以貪濁聞其性本好神仙頗修服餌之術然乃以賤價市丹砂之下者以充其用叟曰彼甘心以營服食蓋至誠以愛其軀命者也尚猶顧吝若是求其蒞官政處國事夫又何觀吁充徐侯之操真所謂膏肓之疾歟烈祖初造唐勞心五十餘年鬚髮為之早白其所以側席傾遲天下之士蓋可謂無所不至者矣然僅得宋齊丘孫忌李建勳等數人而已就數人中孫與宋不能善終而鍾山公又雅尚亷退是以三世開國而譜傳所録無大可紀者當是時天下瓜裂中國衣冠多依齊臺以故江南稱為文物最盛處然其濯濯如此云爾及宋子嵩用意一變羣憸人乘資以騁二馮查陳遂有五鬼之目望風而投欵者至不可以數計彼正人端士雖數路廣取勞謙遲久而不可以多得翕訿詭隨之黨順風一呼而肩摩踵決唯恐其不容天意之不齊乃至於是叟曰昔漢武帝營甘泉宫度為千門萬户以致神靈是時南山中有所謂卷舌柏者一名側柏一名珠子松帝愛其纚纚下垂如建翠鳯之旗如仙女委佩其色相照耀有如奪人之目因詔凡傍南山諸縣如藍田等處率嵗致三十本列植於階廡之間考漢之諸帝唯孝武長年以嵗計其所致不知其為數幾何其後孝元帝用諸儒之説盡廢諸祕祝之祠自武至元為日亦未幾也祠官長陵董可宗按行故宫求識所謂珠子松者漫不可復得毁垣斷塹但有胡耳等蒙密充牣乎其中彼所謂胡耳者本西域植物中國故無有也自張騫通諸國時有為羊馬之獻者胡耳之實偶綴於毛端因得遺種五陵人所謂鄙棄樵牧以為下材者霜冬就稿常困焚如之禍嗚呼近如南山而過為萬乘之所愛録又率嵗以致之側柏顧不能存之於數十年間逺如西域特因羊馬之殘毳而燔芿鄙賤之餘未有如胡耳者而乃延蔓彌滿至不可勝除然則是果天意歟是果非天意歟千世之下士之多感激者必將澘然於叟之斯言太祖討李重進於揚州南唐遣馮延巳受命太祖召對謂延巳曰凡舉事不欲再籍我遂欲朝服濟江汝主何以相待延巳對曰重進姦雄聞於一時尚且一戰就擒易如拉朽蕞爾小國誠不足仰煩神慮但江南士庶眷戀主恩各有必死之志若天威暴臨恐須少延晷刻大朝倘肯捐棄數十萬卒與之血戰何慮而不可太祖笑曰吾與汝主大義已定前言聊以戲卿耳叟嘗謂延巳此言可以寒心遭逄太祖聖德宏達籠絡宇宙方且置江南於度外是以延巳小夫奉使失辭曽不加責聊答之以一笑也向若𥚹量如魏祖有忮心似隋文則延巳之斯言乃為致討之因矣曽憶春秋時齊魯搆兵齊侯謂魯之行人曰魯人恐乎對曰不和則有之恐則未也齊侯曰野無青草室如懸磬何恃而不恐對曰其小人痛其父兄之讎不能茹度而願致其死力何有于恐君子則更悼失言以致君討且曰先公僖桓以來世尋載盟祖宗之言明神實聞無寧及君之世而肯覆其成唯此之恃亦何有于恐齊侯曰善解兵而加聘焉是故小之所以事大信不諭焉將託傳於説辭忠信以守之説辭以行之猶恐不免焉故曰延巳此言可為寒心義祖嘗夢臨大水水中有黃龍無數旁有一古丈夫冠服如三禮圖所畫節服氏之形荷一大戟而立謂義祖曰汝可隨意捉之義祖袒身而入捉得一龍而出驚悸而覺未幾掠得烈祖飬以為子又烈祖一日晝寢夢一黃龍出殿之西楹矯首內向如窺伺狀烈祖驚起使人偵之顧見元宗方倚楹而立遣人候上動靜於是立嫡之意遂決後主時潯陽潮退有一大鰌環體於洲上時時舉首噞喁水自腦而出數日乃死瀕江之人饜食其肉世説以為海神鑿腦取珠因以致斃叟時不悅知江南國將除矣何則受命之初黃龍入夢今龍之弗兆而海鰌見形夫鰌之不可以為龍也顧其軀體雖大亦何所益然且不容於其藏而暴露於江渚骨節解而膏肉分非亡徵而何後主天性喜學問嘗命兩省丞郎給諌詞掖集賞勤政殿學士分夕於光政殿賜之對坐與相劇談至夜分乃罷其論國事每以富民為務好生戒殺本其天性承􅕚國之後羣臣又皆尋常充位之人議論率不如旨嘗一日嘆曰周公仲尼忽去人逺吾道蕪塞其誰與明乃著為雜説數千萬言曰特垂此空文庶幾百世之下有以知吾心耳叟昔於江表民家竊見寫真容觀其廣頰隆凖風神灑落居然自有塵外意會大明在天爝火不灼而銷滅興王撫運四海居然而面內加之保大以來國謀顛錯民困財匱百度墮紊後主適當頺年勢不能支久蓋亦天時人事互備於斯徐鉉與其弟鍇久被眷顧家素富貴多收竒書弟兄皆力學以儒術名一時是以後進晚生莫不宗尚惟張洎潘佑每每訕譏蓋二人負其才藻不肯少自低下故也及鍇蚤卒鉉後遂當國洎因詭與之合遂出力共擠佑佑以故多不調世指徐為少容而恨潘亦不讓交以為失焉及潘以直諫死士大夫仰髙其德名流爭作詩誄以哀之是時鉉方從容持祿與國俱亡故主公論者少貶其所為叟比聞鉉及湯悅奉詔書江南事居處猥僻未及見其成書然妄意深疑徐尚有忮心或將幸潘之沒而厚誣潘於泉下夫佑實疏雋為人少法度譬如長松古栝固自礧砢多節目乃若趨操必不肯忍為非義也平居一言之不酬雖即刎決而不顧及其當大事立危議挺然不回去古人亦何逺之有後主既已誅佑而察其無他腸意甚悔之是以厚撫其家語及佑事則往往投饋至為作感傷之文此南州士大夫所共知也叟誠逆詐貪書其事以遺後之人使正史或出不能傳其謬悠是亦仁人之用心也盧多遜來聘南伐之形見矣後主亦微知之因遣使乞受封册不報甲戌嵗李穆銜命詔後主入陪郊禋舉國震恐後主恇擾辭疾不敢赴九月王師克池州先是江南夙將並以殂沒主兵者多新進後生大臣皆媕婀取容幃幄籌議自相踳駁其間輕佼者日幸兵戈之興以為功名可圖張遇鄭彥華不請於朝遽以輕兵北襲建安軍又欲火滁州之郛皆不克而返上流鎮守迎旗奔潰王師不血刃而傅城下先是光政使門下侍郎陳喬自以為忠義可以謀國後主亦雅信之於是誅皇甫繼勳定為城守之計城中有盧絳者粗名驍勇舊經征戰人心倚以為固喬因與之爭言氣白後主遣率所領援南徐絳受命鳴鼓整旗由水道方舟而出王師知其必死為開圍而縱之自是孤城坐守無復方略會劉澄以京口降於越盧絳傳入宣歙山間中外喪沮始有請降之議其日後主悉坐羣臣於殿下問計所從出丞相徐鉉等皆唯唯不得對陳喬建白欲遣人冒圍悉起上流之兵背城一戰降固未晚也衛尉卿陳大雅舉笏而言曰侍郎平日自謂赤心許國是以陛下悉心相待名位舄奕流輩所不敢望今都城受圍復欲遣何人犯難者耶後主字大雅而謂之曰審已儒者也平時尚欲急人之急能強為孤一行所謂疾風知徑草板蕩識誠臣也大雅再拜而言曰陛下十許年來焦心養士羣臣不能報稱萬分之一今倉卒之際重煩玉音反覆如此臣罪合萬死然臣愚以為覆水之勢殆于難圖臣雖幸承威靈恐不克辦後主曰我平生喜耽佛學其于世味淡如也先帝棄代冡嫡不天越升非次誠非本心自割江以來亡形已見屈身以奉中朝唯恐獲罪長思脫屣顧無計耳竟煩大討􅕚迫如是孤亦安能惜一日之辱正以城圍淹時旅拒既久暴輸降欵將不見納是以欲起上江征戍共相影答然後投誠請命於是亦或為允大雅曰陛下乏使令不以下臣為不佞奉明命臣請死生以之然敢問上江主帥誰可委以集事後主曰洪州朱令贇志不營私其庶幾分孤之憂大雅曰臣頃經與之同事至悉令贇之為人雖斷斷顧國而無逺謀頗愎諫而自用臣懼非解紛之才也後主曰古人有言中流失船一壺千金今日之急遑暇於擇大雅曰臣請得奉將明命都護諸軍進止臣雖不武願竭駑蹇或有千慮之一得若與令贇共事必無益也後主色不懌曰諸人平時髙談卨稷眼前但欲為任蠻奴計孤亦何所託命也因歔欷而起晚出詔付大雅發令贇等軍督促即行大雅不敢復辭以其夜三鼓犯圍馳出時令贇亦以團聚江西軍馬欲絡繹赴難大雅至勸令贇倍道星行令贇不能用乃於潯陽口縳大筏載糗糧軍資數十萬計行至石碑營於新開河口是日苦霧晝集如帟幕籠罩營上雖對靣人顧不見其掌自外來者言有白氣如虹上亘於天大雅謂令贇曰吾輩為勤王之舉而竒祥若是公宜審度不可忽也令贇亦畏懼不悅斬有罪者數人引軍以行次日至虎樽洲軍士望見王師上有氣皆如翔鸞舞鳯狀咸知不敵令贇謂大雅曰僕此頭顱決為國家效一死念與卿俱沒無益也煩卿為先事入白可乎大雅曰入城易爾北兵氣象如此願明將軍明算審數勿輕舉動也於是大雅馳還臺城辛勤冒矢石才得潛入君臣相持喑嗚泣下大雅曰令贇軍必無成於是使喬草降表焉其日令贇獨乘大航髙數十重上設旗鼓蔽江而下王師聚而攻之矢集如蝟令贇窘不知所為乃急發火油以禦之北風暴起煙焰漲空軍遂大潰令贇死之自旦至申約降未定而城北角陷王師入城矣陳喬羞悸雉經於闕下陳大雅拜辭後主出投殿角井中衣挂井幹不得促決兵人引而出之統帥曹公義其事下令葬喬以其品又録大雅使與後主自隨入朝拜太子洗馬嵗餘忽忽而卒叟嘗聞此三人者皆孤介特立無遊談之助故致位不甚通顯及臨危效命獨先於衆人乃知忠義激發見於臨事有如此者叟嘗欲為之作傳苦不知其譜系今行且老矣私念不腆之文不足表暴幽伏况國亡之際舉朝持祿相為沉淪往往爭言其君之短長以自媒衒甚可醜也彼其視朱陳死事大雅忘身宜其媢忌而橫相詆訾必欲其無傳而後止吁此叟所以執筆涕下浪浪而不自禁者也丞相孫侯忌之在重位也介獨自守不接見賔客生平所不喜者惡之不能忘其與宋齊邱馮延巳輩幾如不同天之仇及將命周朝自知不免私謂副使王崇質曰吾思之熟矣終不忍負永陵一壞土餘非所知也是時鍾謨亦拔自下位與聞國事鋭意有為而不肯比數時輩朝臣嫉之上下側目及北使還朝為唐鎬所擠卒以竄死叟嘗謂此二人者志業不同雖俱負許國之志至死而不變乃如經濟庶務位在百工之上則似非叟之所聞何以言之夫宰相者大官也處大官者不務小察不規小智故曰大匠不斫大庖不豆大勇不鬬大兵不冦齊桓公問相於管仲矣管仲對曰鮑叔之為人清亷潔直視人不已若者不以比之於人聞人之不善入耳而不能忘無已則隰朋其可其為人也上志而下求醜不若黃帝而哀不巳若者其於國也有不聞也其於物也有不知也其於人也有不見也無已則隰朋其可夫宰相者鮑叔之所不能為也而亦何有於孫鍾狐刺而狼狽雖周公亦不足觀也巳獨孤郁有言曰今之在位者其元公歟見一善莫之或稱也其意則曰非吾事也茍以為非吾所當事則無所往而非吾事矣無所往而非吾事天地之間無乃大寂寥矣乎今孫鍾之量不直以為非吾所當事而已矣蓋又挈挈焉規露其所有惟恐人之或先於我也是以護前而排下欲以兩手為天下之障嗚呼天地之生材也實難宰相者當代天工以匠成庶類者也其不任責則必有大譴今孫鍾非止不任責也操一國之勢而顧與士為仇然則卒罹於非命者非不幸也常夢錫性獷直初升朝見黨人互相推挽日以謬悠嘗試之説聾瞽朝聽夢錫大驚因發狂歸杜門丐外補又數年復還朝列會上巳日朝貴出秦淮遊宴坐中有詆大朝事者夢錫瞪目戟手曰諸公平時每言致君如堯舜今反自為小朝耶衆莫之對夢錫歸遂上表歷指權要朋私賣國及發宰執狼籍數事朝廷不能加察以其語大忤奪官流徙夢錫因忽忽不得志以卒待後主時方追加甄贈叟嘗謂上古之時人偽未熾有所謂指邪戒佞之草非能痛切於人也然其芒頴之所搖巳足以破非心於肝膈矣德之下衰文姦而飾許者漸起於是有神羊獬豸之獸造形而致觸然尚未有聲氣也而其頭角之所取亦足以判曲直明是非德又下衰混淆而區處以智力相軋爭其消息乃如寒暑之序而莫得其端倪不復可以衝決矣乃有悻悻頩怒之氣鍾於中不能巳節士呌號疾呼凌等而犯分不惜其軀命而貪以其不資之孤力思有以排拔山之根黨雖且不格以死亡猶將使後世之下粗有概操者亦皆為之毛髮森􅋏有如夢錫者真其人歟吁自草而獸自獸而人至於人亦極矣而又且不勝焉吾不知繼其後者又將孰恃以寄其直耶冥冥之上不曰有天乎借或天且恝然而不以為事則吾知其末如之何矣晉王景遂性好寶玉嘗以玉杯行酒坐客傳玩以為希世之竒贊善張易佯醉抵之地曰貴寶賤士大王不當如是坐上客皆􅌓眙失色王斂容謝之自是每慰薦易及易當使海東王驚促入白上以為朝臣如張易不可多得奈何逺使使之冒犯風濤也上曰無憂也如易之為人海神豈敢侮之耶叟嘗謂人之常情甘於耳目之近玩而昵於左右之諛言泯泯以終其身而不之知覺者舉皆是也古語有之自非聖人不能受人盡言張易輕以胸臆而回宗藩之嗜好非惟不加吝惜而更得褒敬焉故張易言之無難也晉王受之為難迥回視坐上逄意而贊竒之人何啻奴顔婢膝乞丐者之所為夫彼既忍為是態矣卒然有正直之言橫出於其所不意求其不沾沾巧讒以媢嫉正士者幸矣則其􅌓眙瑟縮顧色不能自主亦無足怪也今晉王乃能超然出於流俗尋常之見而危受國士之言於羣枉之中至為之終身愛惜惟恐其不至以是而迹王之所存其有以大過人者世之人連連於形迹之偽而促為斂容以謝者蓋有之矣然未必由衷也未必由衷則不能如王之慰薦易者矣嗚呼九泉而可作也叟其擁篲於晉邸之門天長令江夢孫初至官吏白大廳妖怪不可居請止便室夢孫曰勿恤吾自當之既夕果有魅呼笑而至掀投床几叩寢室疾呼曰江夢孫速出夢孫臥聞答之以諾乃整朝服秉執出户爇爐奠爵而祝曰不知何人輒敢召縣令夫令為民長必有正廳以衙羣吏汝或為神必當受民祠祀豈得非理與王者主宰爭居官府日月昭晰吾當奏白汝雖後悔其可及乎由是闃然不復聞靈響矣叟曰太古之時民神雜擾申命重黎絶地天通禹鑄九鼎以圖神姦使人人通知其名象雖入山林而繆盩弗祥之氣弗敢姦也聖人之所以慮天下後世者可謂詳盡矣今天長之魅乃據縣令治所而與其官長爭處吁豈不怪矣乎然而人之心靜者天地可鑒也日月可照也出其言而不戾於正則羣枉者必將撓服考夢孫之所以行巳者魅固不格矣奈何尚且恣睢作為淫威及聞正言然後情得意沮藏匿伏息彼亦下愚之類非所謂黠鬼也宋子嵩初佐烈祖招徠俊傑布在班行如孫晟韓熙載等皆有特操議論可聽及晚年惑於陳覺馮延巳等更疏薄平時素所知奬者新進用事之人聲勢氣焰往往炙手可熱孫丞相等嘗所歎吒一日晟間見齊丘曰君侯以管樂之才當阿衡之地好惡舉動不可不審且人主所與共心意者近則法從數君子逺則七人之列與三院御史皆繩愆糾繆之任又勸講金華所以開發上聽羽儀儲宫所以隆重國本皆須搜擇碩德其性方整重質有守而不回邪之人比日所除羣聽尚且不愜將復何所兾耶齊丘曰無忌素以大量稱號能容同異者方今大業草創實藉衆俊奈何銖稱而衡較且人全材實不易得若以一節一目而廢其尋常僕懼無時而可以得人也晟曰不然僕聞之昔者墨子見染素絲者而嘆曰所入者變其色亦變凡五入而為五色矣故染不可不慎也舜染於許由伯陽禹染於臯陶伯益湯染於伊尹仲虺武王染於太公望周公旦此四王者所以染當故王天下夏桀染於羊辛岐踵之戎紂染於崇侯惡來厲王染於虢公長父榮夷終幽王染於虢公鼓祭敦此四王者所染不當故為天下僇今晟之私憂過計非謂求備於人材也畏所入者變則其色亦變也夫戒在於所染豈惟人主則然自千乘之國百乘之家以至於士庶人無不其然君侯德􅍾內定洞鑒情偽灼知事物之數小夫憸人固無竄察晟實恐九重淵深四聰之路不宜壅塞倘若左右前後坌至霧集政當有膚受之詬或可以移乾剛之斷當爾之日君侯方將挈其契領無所及矣晟本羈旅之餘智意昏痗誠感主上不世之遇而懷君侯推轂之私故貪竭其毣毣之思唯君侯才幸又數日韓熙載入見齊丘曰小人今旦出郊見羣兒為飛鳶之戲竊有所感激也今為相君言之可乎齊丘曰願聞之熙載曰夫飛鳶之初逝也其絲發於輪緩急在於掌握之間或上或下蓋惟羣兒所欲爾及空回風迅線尾端直時或激昻動搖羣兒相語曰此名索線也慎不可縱縱則斷線而去矣執線輪者心知其如此然獨念其決起可以快一時之觀而又力亦有所不能加力不能加則雖欲不縱亦不可得也既縱之後怦怦如鼓危絃其聲琮琤忽一得勢則大挽裂以往或盤珊太虛之上或投於滄洲杳渺之外或罥於積莽翳薈之間羣兒躡斷緒窮荒徑盡日力而不可得踵穿衣決而返至為其親加撲捶焉嗟夫世事大有似此者願相君以為念齊丘曰日者無忌有言於齊丘之心鼎鼎然今叔言之辨可謂微矣吾方思之異日有以教我願有所承熙載曰天下之勢蓋又有甚於此者須别日謁之及馮陳朱查之黨成齊丘地在嫌疑甚不得巳遜於九峯之谷一日晨起覽鏡曰吾貌有慚色應愧孫無忌韓叔言蓋謂此也叟曰憸猾之移人也顧不怪哉宋子嵩心知其故而且不免焉古詩有之當路莫栽荆棘樹他時免挂子孫衣乃如子嵩則身罹其難由其用智之不明故也惜夫山東有隱君子者素負傑人之材與昌黎韓熙載同時南渡初以説干宋齊丘為五可十必然之論大抵多指湯武伊吕事齊丘謝曰子之道大吾懼不能了此因引以見烈祖烈祖曰江南之埒如覆甌子幸何以教我對曰昔關中父老語劉德輿曰長安千門萬户是公家百姓五陵聨絡是公家墳墓捨此將欲何之故小人亦以是為明使君願倘不能拓定中土王有京雒終不足言也烈祖頗喜其言然以南國初基未能用也遂擢為校書郎縻以郡從事雅非其所欲也於是放意泉石以詩酒自娛及嗣主登位韓叔言表薦其名召將用之見於便殿曰臣草野之人漁釣而已邦國大計非臣所能知嗣主賜之以酒飲即徑醉溺於殿陛之下上笑曰真隱士也賜田五百畝以遣之遂卒不仕叟嘗聞帝者得其根荄王者得其英華霸者得其附枝小之不可以為大猶東之不可以為西也有如之人者邀説烈祖以王者之事而不合則有卷之而已矣夫豈肯斫而小之哉昌黎韓熙載字叔言慷慨有才學嘗著書號格言傳於世家故富豪頗好侈忲不為烈祖所禮元宗愛其詞章且東宫舊僚也故驟見任用在朝挺挺諒直不為權勢所喜至誣以縱酒黜為和州司馬其實熙載酒量涓滴而已久之復入綸掖誥令典雅有元和風采江表碑碣大手筆咸出其手初熙載自以羈旅被遇思展布支體以報人主內念報國之意莫急於人材於是大開門館延納雋彥凡占一技一能之士無不加意收采惟恐不及雖久病疲薾亦不廢接對至誠奬進後輩乃其天性每得一文筆手自繕寫展轉愛玩至其紙生毛猶不忍遽捨後房蓄聲妓皆天下妙絶彈絲吹竹清歌艷舞之觀所以娛侑賔客者皆曲臻其極是以一時豪傑如蕭儼江文蔚常夢錫馮延巳馮延魯徐鉉徐鍇潘佑舒雅張洎之徒舉集其門熙載又長於劇談與相反覆論難多深切當世之務故熙載每有表疏論列聞聽翕然以為愜當後主即位適會朱元反叛頗有疑北客之意惟待熙載不衰又熙載曽將命大朝留不得遣有詩題館中曰我本江北人去作江南客還至江北時舉目無相識清風吹我寒明月為誰白不如歸去來江南有人憶時宰見而憫之為白天子遣還以此之故嫌疑不及然熙載內亦不自安因彌事荒宴殆于廢日俸祿之數不能充其用及身沒之日後主痛惜曰天奪我良臣遂不得爰立顧左右曰今將贈熙載以平章事前代當有此例否或對曰劉穆之贈開府儀同三司即其例也後主即日出手書詔贈以平章事追諡曰文靖葬於梅嶺岡謝安墓側江南人臣恩禮少有其比叟嘗謂進賢受上賞蔽賢蒙顯戮此興王之令典也及讀虞書稱天秩五禮天討五罪又大易之辭曰君子以遏惡揚善順天休命乃知興王之所柄以賞罰者是乃天意也宋子嵩孫無忌以才名髙於南唐子嵩在位三十許年歷處權任然睢盱自大而尤恨人之不同己者無忌鐡心石腸落落以忠赤自許至其論人才則門下蓋如掃焉二丞相之死雖其事不同而皆罹非命并其孫子殄殱無遺叟意其為天之所殛故也韓叔言雖奉養過腆動罣譏議處世逼迫略無好蹤然身死之日備享哀榮蓋其平生特以愛禮人士為稱而已矣叟又意其為天之所佑故也夫天之所為人莫之知雖勇如賁育者不能支亦不能移也後之有位君子其戒之哉其戒之哉劍浦人陳陶學通天人自負台鉉之器不肯妄干託及聞宋子嵩秉政凡所薦擢率浮靡憸佞陶自知決不能入因築室南都之西山以吟詠自放及齊邱出鎮陶更有蒲輪之望仍自詠曰中原莫道無鸞鳯自是皇家結網疏故與水曹郎任畹相善以詩寄之云好向明時薦遺逸莫教千古弔靈均朝廷亦知其名欲加召用會割江多故未暇也是時江南多妖孽彗孛晝見陶察運祚衰替不可扶持遂絶意於薦紳専以服食鍊氣為事又有詩云乾坤見了文章懶龍虎成來印綬疏又云近來世上無徐庶誰向桑麻識卧龍又云磻溪老叟無人問間列柦梨教六韜柦梨其二子小字也或問其優劣陶答曰味雖不同皆可於口叟嘗謂明王馭世哲匠宰物要當使一世之士相為低昻無有賫志遺恨者夫然後物物得其平夫是之謂太平昔應侯與賈子坐於堂上聞有鼓琴之聲應侯曰一何悲耶賈子曰張急調下故使之悲耳夫張急者良材也調下者卑處也取彼良材而卑處之能勿悲矣乎是故騏驥不遺能於良樂良寶不藏耀於隋郢蓋其輝光夜射則價髙秦趙飛駟滅沒則豈論燕越物尚有之士亦宜然庾闡有云桂林生於五嶺杞梓出於南荆夫以卉木之盛猶載在方志况千里之朝懷其良彥而俾之滯於常流莫登於龍津者乎故叟以陳陶之志業而考之有以知唐室之不競釣磯立談
