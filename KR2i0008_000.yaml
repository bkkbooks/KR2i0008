body:
  text: 釣磯立談載記𩔖提要臣等謹案釣磯立談一卷其書世有二本此本為葉林宗從錢曾所藏宋刻抄出後題臨安府太廟前尹家書籍舖刋行不著撰人名氏前有自序云叟山東一無聞人也清泰年中隨先校書避地江表始營釣磯于江渚割江之後先校書不禄叟嗣守敝廬不復以進取為念王師弔伐時移事往將就蕪沒隨意所商疏之於紙得百二十許條題之曰釣磯立談云云别一本為曹寅所刋卷首佚其自序又卷首佚自楊氏奄有江淮一條趙王李徳誠一條其餘亦多異同而題曰史虚白撰考馬令南唐書虚白山東人中原多事因韓熙載渡淮以詩酒自娯不言其有所著述觀書中山東有隠君子者一條稱與熙載同時渡淮以説干烈祖擢為校書郎非其所願遂卒不仕又唐祚中興一條云有隠君子作割江賦以諷又有隠士詩云風雨揭却屋渾家醉不知云云與虚白傳悉合則隠君子當即虚白序中兩稱先校書則作書者當為虚白之子書中有宋太祖廟號則當成於太宗時曹氏新本竟題虚白撰者誤也至南宋費樞亦嘗撰釣磯立談今尚載陶宗儀説郛中其文與此迥别則又名同而實異者矣其書雜録南唐事迹附以論斷于李氏率無貶詞猶有不忘故國之意其中徐鉉一條稱鉉方奉詔與湯悦書江南事慮鉉與潘佑不協或誣以他詞則亦雜史中之不失是非者也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀釣磯立談序叟山東一無聞人也清泰年中隨先校書避地江表始營釣磯於江渚先校書意薄簮組心許泉石每乗雙犢板轅車車後掛酒壺山童三五人例各總角負瓢并席具以自隨遇境物勝概則取酒徑醉或為歌詩自號釣磯閒客割江之後先校書不祿叟嗣守敝廬頗窺先志不復以進取為念會王師弔伐李氏挈宗以朝湖海表裏俱為王人大同之慶有識之所共覩咸以為百生不可逢之盛際叟獨何者而私自怫鬰如有懐舊之思追惟江表自建國以来烈祖元宗其所以撫奄斯人盖有不可忘者時移事往將就蕪沒叟身非朝行口不食禄固無預於史事顧耳目之所及非網罟之至議則波濤之寱語也隨意所商聊復疏之於紙僅得百二十許條總而題之曰釣磯立談使小子温成誦於口粗以存其梗概云吁文慚子山之麗興哀則有之才愧士衡之多辨亡亦幾矣
